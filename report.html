<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>98GO e-bike｜銷售報表</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --brand:#2B2D42;--accent:#E63946;--green:#1D9E75;
  --blue:#185FA5;--amber:#854F0B;--purple:#534AB7;
  --gray1:#f8f8f8;--gray2:#f0f0f0;--gray3:#e0e0e0;
  --gray4:#aaa;--gray5:#666;--text:#1a1a1a;
}
body{font-family:'Noto Sans TC',sans-serif;background:#f0f2f5;color:var(--text);min-height:100vh;}

/* Header */
.header{background:var(--brand);color:#fff;padding:1rem 1.5rem;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;box-shadow:0 2px 16px rgba(0,0,0,0.2);}
.logo{display:flex;flex-direction:column;align-items:center;justify-content:center;width:44px;height:44px;border-radius:10px;background:var(--accent);flex-shrink:0;}
.logo span:first-child{font-size:14px;font-weight:900;color:#fff;line-height:1.1;letter-spacing:-.5px;}
.logo span:last-child{font-size:8px;color:rgba(255,255,255,.8);letter-spacing:.1em;}
.header h1{font-size:17px;font-weight:700;}
.header p{font-size:11px;opacity:.6;margin-top:1px;}
.header-right{margin-left:auto;display:flex;align-items:center;gap:12px;}
.refresh-btn{padding:6px 14px;border-radius:6px;border:1px solid rgba(255,255,255,.3);background:rgba(255,255,255,.1);color:#fff;font-size:12px;font-family:inherit;cursor:pointer;transition:all .2s;}
.refresh-btn:hover{background:rgba(255,255,255,.2);}
.last-update{font-size:11px;opacity:.5;}

/* Nav tabs */
.nav{background:#fff;border-bottom:1px solid var(--gray3);padding:0 1.5rem;display:flex;gap:0;overflow-x:auto;}
.nav-tab{padding:.75rem 1.25rem;border:none;background:none;font-size:13px;font-family:inherit;color:var(--gray5);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .2s;}
.nav-tab.active{color:var(--brand);border-bottom-color:var(--brand);font-weight:600;}
.nav-tab:hover{color:var(--text);}

/* Main */
.main{max-width:1200px;margin:0 auto;padding:1.5rem;}

/* Loading */
.loading{text-align:center;padding:4rem 0;color:var(--gray4);}
.spinner{width:36px;height:36px;border:3px solid var(--gray2);border-top-color:var(--brand);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 1rem;}
@keyframes spin{to{transform:rotate(360deg);}}

/* Metric cards */
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:1.5rem;}
.metric{background:#fff;border-radius:10px;padding:1.25rem;box-shadow:0 1px 4px rgba(0,0,0,0.06);}
.metric .lbl{font-size:11px;color:var(--gray4);font-weight:600;letter-spacing:.04em;text-transform:uppercase;margin-bottom:6px;}
.metric .val{font-size:26px;font-weight:700;color:var(--text);line-height:1;}
.metric .sub{font-size:11px;color:var(--gray4);margin-top:4px;}
.metric.accent{background:var(--brand);}
.metric.accent .lbl,.metric.accent .val,.metric.accent .sub{color:#fff;}
.metric.accent .lbl{opacity:.6;}
.metric.accent .sub{opacity:.5;}

/* Cards */
.card{background:#fff;border-radius:10px;padding:1.25rem;box-shadow:0 1px 4px rgba(0,0,0,0.06);margin-bottom:1rem;}
.card-title{font-size:14px;font-weight:700;color:var(--brand);margin-bottom:1rem;padding-bottom:.625rem;border-bottom:1px solid var(--gray2);display:flex;align-items:center;gap:6px;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
@media(max-width:640px){.grid2{grid-template-columns:1fr;}}

/* Table */
.tbl-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{text-align:left;padding:8px 10px;color:var(--gray5);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.04em;border-bottom:1.5px solid var(--gray3);white-space:nowrap;}
td{padding:9px 10px;border-bottom:1px solid var(--gray2);color:var(--text);white-space:nowrap;}
tr:hover td{background:var(--gray1);}
tr:last-child td{border-bottom:none;}
.badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:99px;font-weight:500;}
.badge-green{background:#E1F5EE;color:#085041;}
.badge-blue{background:#E6F1FB;color:#185FA5;}
.badge-amber{background:#FFF3E5;color:#633806;}
.badge-red{background:#fff0f1;color:#A32D2D;}
.badge-purple{background:#EEEDFE;color:#534AB7;}

/* Bar chart manual */
.bar-item{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.bar-label{font-size:12px;color:var(--gray5);width:100px;text-align:right;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;}
.bar-track{flex:1;height:22px;background:var(--gray2);border-radius:4px;overflow:hidden;}
.bar-fill{height:100%;border-radius:4px;transition:width .6s ease;display:flex;align-items:center;padding:0 8px;}
.bar-fill span{font-size:11px;font-weight:600;color:#fff;white-space:nowrap;}

/* Status pills */
.status-pending{background:#FFF3E5;color:#633806;border-radius:99px;font-size:11px;padding:2px 10px;font-weight:500;}
.status-done{background:#E1F5EE;color:#085041;border-radius:99px;font-size:11px;padding:2px 10px;font-weight:500;}
.status-late{background:#fff0f1;color:#A32D2D;border-radius:99px;font-size:11px;padding:2px 10px;font-weight:500;}

/* Section filter */
.filter-row{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap;align-items:center;}
.filter-row label{font-size:12px;color:var(--gray5);}
.filter-row select,.filter-row input{padding:5px 10px;border:1px solid var(--gray3);border-radius:6px;font-size:13px;font-family:inherit;color:var(--text);background:#fff;}
.search-input{flex:1;min-width:180px;}
.filter-btn{padding:5px 14px;border-radius:6px;border:1px solid var(--gray3);background:#fff;font-size:12px;font-family:inherit;cursor:pointer;color:var(--gray5);transition:all .15s;}
.filter-btn:hover{background:var(--brand);color:#fff;border-color:var(--brand);}
.filter-btn.active{background:var(--brand);color:#fff;border-color:var(--brand);}

/* Error */
.error-box{background:#fff0f1;border:1px solid #F5C4B3;border-radius:8px;padding:1rem;color:#712B13;font-size:13px;line-height:1.7;}

/* ===== 密碼保護 ===== */
#lock-screen {
  position:fixed;inset:0;background:#f0f2f5;
  display:flex;align-items:center;justify-content:center;
  z-index:9999;
}
.lock-box {
  background:#fff;border-radius:16px;padding:2.5rem 2rem;
  box-shadow:0 8px 40px rgba(0,0,0,0.13);
  width:100%;max-width:360px;text-align:center;
}
.lock-logo {
  display:inline-flex;flex-direction:column;align-items:center;justify-content:center;
  width:60px;height:60px;background:#E63946;border-radius:14px;
  margin-bottom:1.25rem;
}
.lock-logo span:first-child{font-size:18px;font-weight:900;color:#fff;line-height:1.1;letter-spacing:-.5px;}
.lock-logo span:last-child{font-size:9px;color:rgba(255,255,255,.8);letter-spacing:.1em;}
.lock-box h2{font-size:18px;font-weight:700;color:var(--brand);margin-bottom:.4rem;}
.lock-box p{font-size:12px;color:var(--gray4);margin-bottom:1.5rem;}
.lock-input {
  width:100%;padding:12px 14px;border:2px solid var(--gray3);border-radius:10px;
  font-size:16px;font-family:inherit;text-align:center;letter-spacing:.15em;
  color:var(--brand);transition:border-color .2s;margin-bottom:.75rem;
}
.lock-input:focus{outline:none;border-color:var(--brand);}
.lock-input.error{border-color:var(--accent);animation:shake .3s;}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.lock-btn {
  width:100%;padding:12px;background:var(--brand);color:#fff;border:none;
  border-radius:10px;font-size:15px;font-weight:700;font-family:inherit;
  cursor:pointer;transition:background .2s;
}
.lock-btn:hover{background:#1a1c2e;}
.lock-error{font-size:12px;color:var(--accent);margin-top:.5rem;height:16px;}
</style>
</head>
<body>

<!-- 密碼保護畫面 -->
<div id="lock-screen">
  <div class="lock-box">
    <div class="lock-logo"><span>98GO</span><span>e-bike</span></div>
    <h2>🔒 內部管理系統</h2>
    <p>請輸入存取密碼</p>
    <input class="lock-input" type="password" id="lock-input" placeholder="••••••••"
      onkeydown="if(event.key==='Enter')checkPassword()" autocomplete="off" maxlength="20">
    <button class="lock-btn" onclick="checkPassword()">確認進入</button>
    <div class="lock-error" id="lock-error"></div>
  </div>
</div>

<div id="app-body" style="display:none;">
<div class="header">
  <div class="logo">
    <span>98GO</span>
    <span>e-bike</span>
  </div>
  <div>
    <h1>銷售報表</h1>
    <p>內部管理系統</p>
  </div>
  <div class="header-right">
    <span class="last-update" id="last-update"></span>
    <button class="refresh-btn" onclick="loadData()">重新整理</button>
  </div>
</div>

<div class="nav">
  <button class="nav-tab active" onclick="switchTab('overview')">業績總覽</button>
  <button class="nav-tab" onclick="switchTab('sales')">銷售排行</button>
  <button class="nav-tab" onclick="switchTab('purchase')">採購計算</button>
  <button class="nav-tab" onclick="switchTab('delivery')">出貨進度</button>
  <button class="nav-tab" onclick="switchTab('customer')">客戶分析</button>
  <button class="nav-tab" onclick="switchTab('records')">所有記錄</button>
</div>

<div class="main">
  <div id="loading" class="loading">
    <div class="spinner"></div>
    <p>載入資料中...</p>
  </div>

  <div id="content" style="display:none;">

    <!-- 業績總覽 -->
    <div id="tab-overview">
      <div class="metrics" id="metrics-overview"></div>

      <div class="card">
        <div class="card-title">💰 現金流明細</div>
        <div class="filter-row" style="margin-bottom:1rem;">
          <label>查帳區間：</label>
          <input type="date" id="cf-from" onchange="renderOverview()">
          <span style="color:var(--gray4);font-size:13px;">～</span>
          <input type="date" id="cf-to" onchange="renderOverview()">
          <button onclick="setCFToday()" style="padding:5px 12px;border-radius:6px;border:1px solid var(--gray3);background:#fff;font-size:12px;font-family:inherit;cursor:pointer;">今日</button>
          <button onclick="setCFMonth()" style="padding:5px 12px;border-radius:6px;border:1px solid var(--gray3);background:#fff;font-size:12px;font-family:inherit;cursor:pointer;">本月</button>
          <button onclick="setCFYear()" style="padding:5px 12px;border-radius:6px;border:1px solid var(--gray3);background:#fff;font-size:12px;font-family:inherit;cursor:pointer;">本年</button>
          <button onclick="clearCF()" style="padding:5px 12px;border-radius:6px;border:1px solid var(--gray3);background:#fff;font-size:12px;font-family:inherit;cursor:pointer;">全部</button>
        </div>
        <div class="tbl-wrap">
          <table id="table-cashflow">
            <thead><tr>
              <th>付款方式</th>
              <th style="text-align:right;">訂金筆數</th>
              <th style="text-align:right;">訂金合計</th>
              <th style="text-align:right;">尾款筆數</th>
              <th style="text-align:right;">尾款合計</th>
              <th style="text-align:right;">小計</th>
            </tr></thead>
            <tbody id="tbody-cashflow"></tbody>
            <tfoot id="tfoot-cashflow"></tfoot>
          </table>
        </div>
      </div>
    </div>

    <!-- 銷售排行 -->
    <div id="tab-sales" style="display:none;">
      <div class="filter-row">
        <label>篩選月份：</label>
        <select id="sales-month" onchange="renderSales()"></select>
      </div>
      <div class="grid2">
        <div class="card">
          <div class="card-title">🏍 車款銷售排行</div>
          <div id="model-bars"></div>
        </div>
        <div class="card">
          <div class="card-title">🔋 電池規格排行</div>
          <div id="battery-bars"></div>
        </div>
      </div>
      <div class="grid2">
        <div class="card">
          <div class="card-title">🎨 顏色排行</div>
          <div id="color-bars"></div>
        </div>
        <div class="card">
          <div class="card-title">💳 付款方式分布</div>
          <div id="payment-bars"></div>
        </div>
      </div>
    </div>

    <!-- 採購計算 -->
    <div id="tab-purchase" style="display:none;">
      <div class="filter-row">
        <label>日期區間：</label>
        <input type="date" id="purchase-from" onchange="renderPurchase()">
        <span style="color:var(--gray4);font-size:13px;">～</span>
        <input type="date" id="purchase-to" onchange="renderPurchase()">
        <button onclick="setPurchaseMonth()" style="padding:5px 12px;border-radius:6px;border:1px solid var(--gray3);background:#fff;font-size:12px;font-family:inherit;cursor:pointer;">本月</button>
        <button onclick="setPurchaseYear()" style="padding:5px 12px;border-radius:6px;border:1px solid var(--gray3);background:#fff;font-size:12px;font-family:inherit;cursor:pointer;">本年</button>
        <button onclick="clearPurchase()" style="padding:5px 12px;border-radius:6px;border:1px solid var(--gray3);background:#fff;font-size:12px;font-family:inherit;cursor:pointer;">全部</button>
      </div>
      <div class="grid2">
        <div class="card">
          <div class="card-title">📦 車款銷售數量</div>
          <div id="purchase-model"></div>
        </div>
        <div class="card">
          <div class="card-title">🔋 電池需求數量</div>
          <div id="purchase-battery"></div>
        </div>
      </div>
      <div class="card">
        <div class="card-title">🛍 加價購項目統計</div>
        <div id="purchase-addon"></div>
      </div>
    </div>

    <!-- 出貨進度 -->
    <div id="tab-delivery" style="display:none;">
      <div class="metrics" id="metrics-delivery"></div>
      <div class="filter-row" style="flex-wrap:wrap;gap:8px;align-items:center;">
        <label>狀態：</label>
        <select id="delivery-filter" onchange="renderDelivery()">
          <option value="pending">待交車</option>
          <option value="all">全部（含已交車）</option>
          <option value="done">已交車</option>
          <option value="overdue">已逾期</option>
        </select>
        <span style="color:var(--gray3);margin:0 4px;">｜</span>
        <label>快速區間：</label>
        <button onclick="setDeliveryToday()" class="filter-btn">今日</button>
        <button onclick="setDeliveryWeek()" class="filter-btn">本週</button>
        <button onclick="setDeliveryMonth()" class="filter-btn">本月</button>
        <button onclick="clearDeliveryDate()" class="filter-btn">全部</button>
      </div>
      <div class="filter-row" style="gap:8px;align-items:center;margin-top:-4px;">
        <label>自訂區間：</label>
        <input type="date" id="delivery-from" onchange="renderDelivery()" style="padding:5px 10px;border:1px solid var(--gray3);border-radius:6px;font-size:13px;font-family:inherit;">
        <span style="color:var(--gray4);font-size:13px;">～</span>
        <input type="date" id="delivery-to" onchange="renderDelivery()" style="padding:5px 10px;border:1px solid var(--gray3);border-radius:6px;font-size:13px;font-family:inherit;">
        <span style="color:var(--gray3);margin:0 4px;">｜</span>
        <label>月份：</label>
        <select id="delivery-month" onchange="onDeliveryMonthChange()" style="padding:5px 10px;border:1px solid var(--gray3);border-radius:6px;font-size:13px;font-family:inherit;">
          <option value="">不限月份</option>
        </select>
      </div>
      <div class="card">
        <div class="card-title">🚚 交車清單</div>
        <div class="tbl-wrap">
          <table id="table-delivery">
            <thead><tr>
              <th>預計交車日</th><th>狀態</th><th>客戶</th><th>手機</th>
              <th>車款</th><th>顏色</th><th>電池</th><th>Sale</th><th>總金額</th><th>尾款狀態</th>
            </tr></thead>
            <tbody id="tbody-delivery"></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- 客戶分析 -->
    <div id="tab-customer" style="display:none;">
      <div class="grid2">
        <div class="card">
          <div class="card-title">⚧ 性別統計</div>
          <div id="gender-bars"></div>
        </div>
        <div class="card">
          <div class="card-title">🎂 年齡分布</div>
          <div id="age-bars"></div>
        </div>
      </div>
      <div class="grid2">
        <div class="card">
          <div class="card-title">📍 客戶地區分布（縣市）</div>
          <div id="city-bars"></div>
        </div>
        <div class="card">
          <div class="card-title">📍 行政區分布</div>
          <div id="district-bars"></div>
        </div>
      </div>
      <div class="card">
        <div class="card-title">📣 來源渠道分析</div>
        <div id="source-bars"></div>
      </div>
    </div>

    <!-- 所有記錄 -->
    <div id="tab-records" style="display:none;">
      <div class="filter-row">
        <input type="text" class="search-input" id="search-input" placeholder="搜尋客戶、車款、Sale..." oninput="filterRecords()">
        <select id="filter-month" onchange="filterRecords()"></select>
        <select id="filter-sale" onchange="filterRecords()">
          <option value="">所有 Sale</option>
        </select>
      </div>
      <div class="card">
        <div class="tbl-wrap">
          <table>
            <thead><tr>
              <th>日期</th><th>單號</th><th>客戶</th><th>手機</th>
              <th>車款</th><th>電池</th><th>總金額</th><th>訂金</th><th>訂金付款</th><th>尾款</th><th>尾款付款</th><th>Sale</th>
            </tr></thead>
            <tbody id="tbody-records"></tbody>
          </table>
        </div>
      </div>
    </div>

  </div>
</div>
</div><!-- end app-body -->

<script>
// ====== PASSWORD ======
const CORRECT_PASSWORD = '9866';
function checkPassword() {
  const input = document.getElementById('lock-input');
  const err = document.getElementById('lock-error');
  if (input.value === CORRECT_PASSWORD) {
    document.getElementById('lock-screen').style.display = 'none';
    document.getElementById('app-body').style.display = 'block';
    sessionStorage.setItem('98go_auth', '1');
    loadData();
  } else {
    input.classList.add('error');
    err.textContent = '密碼錯誤，請再試一次';
    input.value = '';
    setTimeout(() => { input.classList.remove('error'); err.textContent = ''; input.focus(); }, 1000);
  }
}
// 若本次已驗證過（重新整理不需重輸）
if (sessionStorage.getItem('98go_auth') === '1') {
  document.getElementById('lock-screen').style.display = 'none';
  document.getElementById('app-body').style.display = 'block';
}

// ====== CONFIG ======
const SHEET_ID = '1eLlGkJ2hvk_XJvJYtVGqGgQ8pCrQolfSkUlGnDhXO8k';
const SHEET_NAME = '購車保固資料表';
const API_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(SHEET_NAME)}`;

let allData = [];
let currentTab = 'overview';

// ====== LOAD DATA ======
async function loadData() {  document.getElementById('loading').style.display = 'block';
  document.getElementById('content').style.display = 'none';
  try {
    const res = await fetch(API_URL);
    const text = await res.text();
    const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)[1]);
    const rows = json.table.rows;
    const cols = json.table.cols;
    allData = rows.map(row => {
      const obj = {};
      cols.forEach((col, i) => {
        obj[col.label || col.id] = row.c[i] ? (row.c[i].v !== undefined ? row.c[i].v : '') : '';
      });
      return obj;
    }).filter(r => r['單號']);
    document.getElementById('last-update').textContent = '更新：' + new Date().toLocaleTimeString('zh-TW');
    renderAll();
    document.getElementById('loading').style.display = 'none';
    document.getElementById('content').style.display = 'block';
  } catch(e) {
    document.getElementById('loading').innerHTML = `<div class="error-box">❌ 無法載入資料，請確認 Google Sheets 已開放「知道連結的人可以檢視」<br><br>錯誤：${e.message}</div>`;
  }
}

function getNum(row, key) {
  return parseFloat(row[key]) || 0;
}
function getDate(row, key) {
  const v = row[key];
  if (!v) return null;
  if (typeof v === 'string') {
    // Google Sheets gviz returns Date(year,month,day) where month is 0-based
    const match = v.match(/Date\((\d+),(\d+),(\d+)\)/);
    if (match) return new Date(parseInt(match[1]), parseInt(match[2]), parseInt(match[3]));
    const d = new Date(v);
    return isNaN(d.getTime()) ? null : d;
  }
  if (typeof v === 'number') return new Date((v - 25569) * 86400000);
  return null;
}
function fmtDate(v) {
  if (!v) return '—';
  const d = (typeof v === 'string' || typeof v === 'number') ? getDate({_k:v},'_k') : v;
  if (!d || isNaN(d.getTime())) return String(v).slice(0,10) || '—';
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function getVal(row, key) {
  const v = row[key];
  if (v === null || v === undefined) return '';
  // Handle Google Sheets Date format
  if (typeof v === 'string' && v.startsWith('Date(')) {
    const d = getDate(row, key);
    return d ? fmtDate(d) : '';
  }
  return v.toString().trim();
}
function fmtOrderId(raw) {
  // 從原始單號（EB + timestamp ms）轉成 YYMMD-HHmm 格式
  // 例：EB1776552751604 → 抓時間戳 → 260419-1452
  if (!raw) return '—';
  // 嘗試從單號中抽出時間戳（去掉EB前綴後的數字）
  const ms = parseInt(raw.replace(/^EB/, ''));
  if (!isNaN(ms) && ms > 1000000000000) {
    const d = new Date(ms);
    const yy = String(d.getFullYear()).slice(2);
    const mm = String(d.getMonth()+1).padStart(2,'0');
    const dd = String(d.getDate()).padStart(2,'0');
    const hh = String(d.getHours()).padStart(2,'0');
    const min = String(d.getMinutes()).padStart(2,'0');
    return `${yy}${mm}${dd}-${hh}${min}`;
  }
  return raw.slice(-12) || raw;
}
function fmtMoney(n) {
  return 'NT$ ' + Math.round(n).toLocaleString();
}
function getYM(row) {
  const d = getDate(row, '成交日期');
  if (!d || isNaN(d.getTime())) return '';
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
}

function renderOverview() {
  const now = new Date();
  const fromVal = document.getElementById('cf-from')?.value;
  const toVal = document.getElementById('cf-to')?.value;

  const filtered = allData.filter(r => {
    const d = getDate(r, '成交日期');
    if (!d || isNaN(d.getTime())) return false;
    if (fromVal) {
      const from = new Date(fromVal); from.setHours(0,0,0,0);
      if (d < from) return false;
    }
    if (toVal) {
      const to = new Date(toVal); to.setHours(23,59,59,999);
      if (d > to) return false;
    }
    return true;
  });

  const thisMonth = allData.filter(r => {
    const d = getDate(r,'成交日期');
    return d && d.getMonth()===now.getMonth() && d.getFullYear()===now.getFullYear();
  });
  const today = allData.filter(r => {
    const d = getDate(r,'成交日期');
    if (!d) return false;
    const t = new Date(); 
    return d.getFullYear()===t.getFullYear() && d.getMonth()===t.getMonth() && d.getDate()===t.getDate();
  });
  const totalRevenue = allData.reduce((s,r) => s+getNum(r,'總金額'),0);
  const monthRevenue = thisMonth.reduce((s,r) => s+getNum(r,'總金額'),0);
  const todayRevenue = today.reduce((s,r) => s+getNum(r,'總金額'),0);
  const yearRevenue = allData.filter(r => {
    const d = getDate(r,'成交日期');
    return d && d.getFullYear()===now.getFullYear();
  }).reduce((s,r) => s+getNum(r,'總金額'),0);

  const pendingBalance = allData.filter(r => !getVal(r,'尾款已收') || getVal(r,'尾款已收') === 'FALSE').reduce((s,r) => s+getNum(r,'尾款'),0);

  document.getElementById('metrics-overview').innerHTML = `
    <div class="metric accent"><div class="lbl">今日成交</div><div class="val">${today.length} 筆</div><div class="sub">今日營收 ${fmtMoney(todayRevenue)}</div></div>
    <div class="metric"><div class="lbl">本月營收</div><div class="val">${fmtMoney(monthRevenue)}</div><div class="sub">本月 ${thisMonth.length} 筆</div></div>
    <div class="metric"><div class="lbl">年度營收</div><div class="val">${fmtMoney(yearRevenue)}</div><div class="sub">${now.getFullYear()} 年</div></div>
    <div class="metric"><div class="lbl">平均客單價</div><div class="val">${fmtMoney(allData.length ? totalRevenue/allData.length : 0)}</div><div class="sub">共 ${allData.length} 筆訂單</div></div>
    <div class="metric" style="border:2px solid #E63946;"><div class="lbl" style="color:#A32D2D;">待收尾款總額</div><div class="val" style="color:#E63946;">${fmtMoney(pendingBalance)}</div><div class="sub">尚未收款金額</div></div>
  `;

  // 現金流表格
  const methods = ['現金','匯款/轉帳','刷卡','無卡分期'];
  const cfMap = {};
  methods.forEach(m => cfMap[m] = {depCount:0,dep:0,balCount:0,bal:0});
  filtered.forEach(r => {
    const dm = getVal(r,'訂金支付方式') || '現金';
    const bm = getVal(r,'尾款支付方式') || '現金';
    const dep = getNum(r,'訂金');
    const bal = getNum(r,'尾款');
    if (!cfMap[dm]) cfMap[dm] = {depCount:0,dep:0,balCount:0,bal:0};
    if (!cfMap[bm]) cfMap[bm] = {depCount:0,dep:0,balCount:0,bal:0};
    if (dep > 0) { cfMap[dm].depCount++; cfMap[dm].dep += dep; }
    if (bal > 0) { cfMap[bm].balCount++; cfMap[bm].bal += bal; }
  });

  const colorMap = {'現金':'badge-green','匯款/轉帳':'badge-blue','刷卡':'badge-amber','無卡分期':'badge-purple'};
  let totalDep=0, totalBal=0, totalDepCount=0, totalBalCount=0;
  const rows = Object.entries(cfMap).filter(([,v]) => v.dep+v.bal > 0).map(([method, v]) => {
    totalDep += v.dep; totalBal += v.bal;
    totalDepCount += v.depCount; totalBalCount += v.balCount;
    return `<tr>
      <td><span class="badge ${colorMap[method]||'badge-green'}">${method}</span></td>
      <td style="text-align:right;color:var(--gray5);">${v.depCount} 筆</td>
      <td style="text-align:right;font-weight:500;">${fmtMoney(v.dep)}</td>
      <td style="text-align:right;color:var(--gray5);">${v.balCount} 筆</td>
      <td style="text-align:right;font-weight:500;">${fmtMoney(v.bal)}</td>
      <td style="text-align:right;font-weight:700;color:var(--brand);">${fmtMoney(v.dep+v.bal)}</td>
    </tr>`;
  }).join('');

  document.getElementById('tbody-cashflow').innerHTML = rows || `<tr><td colspan="6" style="text-align:center;color:var(--gray4);padding:2rem;">此區間無資料</td></tr>`;
  document.getElementById('tfoot-cashflow').innerHTML = `
    <tr style="background:#f0f2f5;border-top:2px solid var(--gray3);">
      <td style="font-weight:700;padding:10px;color:var(--brand);">合計</td>
      <td style="text-align:right;padding:10px;color:var(--gray5);">${totalDepCount} 筆</td>
      <td style="text-align:right;padding:10px;font-weight:600;color:var(--brand);">${fmtMoney(totalDep)}</td>
      <td style="text-align:right;padding:10px;color:var(--gray5);">${totalBalCount} 筆</td>
      <td style="text-align:right;padding:10px;font-weight:600;color:var(--brand);">${fmtMoney(totalBal)}</td>
      <td style="text-align:right;padding:10px;font-weight:700;font-size:15px;color:var(--brand);">${fmtMoney(totalDep+totalBal)}</td>
    </tr>`;
}

// ====== DELIVERY ======
function renderDelivery() {
  const today = new Date(); today.setHours(0,0,0,0);
  const filterVal = document.getElementById('delivery-filter')?.value || 'pending';
  const fromVal = document.getElementById('delivery-from')?.value;
  const toVal = document.getElementById('delivery-to')?.value;

  // 日期區間篩選函數（依預計交車日）
  const inRange = r => {
    if (!fromVal && !toVal) return true;
    const d = getDate(r, '預計交車日');
    if (!d) return false;
    if (fromVal && d < new Date(fromVal)) return false;
    if (toVal && d > new Date(toVal + 'T23:59:59')) return false;
    return true;
  };

  // 全資料（不限區間）用於指標卡
  const delivered = allData.filter(r => getVal(r,'尾款已收')==='TRUE');
  const pending = allData.filter(r => getVal(r,'預計交車日') && getVal(r,'尾款已收')!=='TRUE');
  const overdue = pending.filter(r => { const d=getDate(r,'預計交車日'); return d && d < today; });
  const thisWeek = pending.filter(r => { const d=getDate(r,'預計交車日'); return d && d>=today && d<=new Date(today.getTime()+7*86400000); });

  document.getElementById('metrics-delivery').innerHTML = `
    <div class="metric"><div class="lbl">待交車總數</div><div class="val">${pending.length} 筆</div></div>
    <div class="metric accent"><div class="lbl">本週待交車</div><div class="val">${thisWeek.length} 筆</div></div>
    <div class="metric"><div class="lbl">逾期未交車</div><div class="val" style="color:#E63946;">${overdue.length} 筆</div></div>
    <div class="metric" style="background:#E1F5EE;"><div class="lbl" style="color:#085041;">已交車</div><div class="val" style="color:#1D9E75;">${delivered.length} 筆</div></div>
  `;

  // 依狀態 + 日期區間篩選顯示清單
  let showData;
  if (filterVal === 'done') showData = delivered.filter(inRange);
  else if (filterVal === 'all') showData = [...pending, ...delivered].filter(inRange);
  else if (filterVal === 'overdue') showData = overdue.filter(inRange);
  else showData = pending.filter(inRange);

  const tbody = document.getElementById('tbody-delivery');
  tbody.innerHTML = showData.sort((a,b)=>{
    const da=getDate(a,'預計交車日'), db=getDate(b,'預計交車日');
    return (da||0)-(db||0);
  }).map(r => {
    const d = getDate(r,'預計交車日');
    const isDone = getVal(r,'尾款已收')==='TRUE';
    let status;
    if (isDone) {
      status = '<span class="status-done">✅ 已交車</span>';
    } else if (d && d < today) {
      status = '<span class="status-late">已逾期</span>';
    } else if (d && d <= new Date(today.getTime()+7*86400000)) {
      status = '<span class="status-pending">本週</span>';
    } else {
      status = '<span class="status-pending">待交車</span>';
    }
    return `<tr${isDone ? ' style="opacity:.6;"' : ''}>
      <td>${fmtDate(getVal(r,'預計交車日'))}</td>
      <td>${status}</td>
      <td>${getVal(r,'姓名')}</td>
      <td>${getVal(r,'手機號碼')}</td>
      <td>${getVal(r,'車款')}</td>
      <td>${getVal(r,'顏色')}</td>
      <td>${getVal(r,'電池類型')} ${getVal(r,'電池規格(V)')} ${getVal(r,'電池規格(ah)')}</td>
      <td>${getVal(r,'Sale')}</td>
      <td>${fmtMoney(getNum(r,'總金額'))}</td>
      <td>${isDone ? '<span class="status-done">已收款</span>' : '<span class="status-late">未收款</span>'}</td>
    </tr>`;
  }).join('') || '<tr><td colspan="10" style="text-align:center;color:var(--gray4);padding:2rem;">尚無資料</td></tr>';
}

// ====== CUSTOMER ======
function renderCustomer() {
  // 性別統計
  renderBarsFromData('gender-bars', allData, '性別', '#534AB7', v => v+' 人');

  // 年齡分布
  const ageMap = {'18歲以下':0,'18-25歲':0,'26-35歲':0,'36-45歲':0,'46-55歲':0,'56歲以上':0,'未填寫':0};
  allData.forEach(r => {
    const b = getVal(r,'生日');
    if (!b) { ageMap['未填寫']++; return; }
    const birth = new Date(b);
    if (isNaN(birth.getTime())) { ageMap['未填寫']++; return; }
    const age = new Date().getFullYear() - birth.getFullYear();
    if (age < 18) ageMap['18歲以下']++;
    else if (age <= 25) ageMap['18-25歲']++;
    else if (age <= 35) ageMap['26-35歲']++;
    else if (age <= 45) ageMap['36-45歲']++;
    else if (age <= 55) ageMap['46-55歲']++;
    else ageMap['56歲以上']++;
  });
  const ageEntries = Object.entries(ageMap).filter(([,v]) => v > 0);
  const ageMax = Math.max(...ageEntries.map(([,v]) => v), 1);
  document.getElementById('age-bars').innerHTML = ageEntries.map(([label,val]) => `
    <div class="bar-item">
      <div class="bar-label">${label}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${val/ageMax*100}%;background:#1D9E75;"><span>${val} 人</span></div></div>
    </div>`).join('') || '<p style="color:var(--gray4);font-size:13px;">尚無資料</p>';

  // 縣市統計
  renderBarsFromData('city-bars', allData, '縣市', '#185FA5', v => v+' 人');

  // 行政區統計
  renderBarsFromData('district-bars', allData, '行政區', '#378ADD', v => v+' 人');

  // 來源渠道
  const srcMap = {};
  allData.forEach(r => {
    const sources = getVal(r,'從哪裡認識我們').split('、');
    sources.forEach(s => { s=s.trim(); if(s) srcMap[s]=(srcMap[s]||0)+1; });
  });
  const srcEntries = Object.entries(srcMap).sort((a,b)=>b[1]-a[1]);
  const srcMax = srcEntries[0]?.[1]||1;
  document.getElementById('source-bars').innerHTML = srcEntries.map(([l,v])=>`
    <div class="bar-item"><div class="bar-label">${l}</div>
    <div class="bar-track"><div class="bar-fill" style="width:${v/srcMax*100}%;background:var(--purple);"><span>${v} 人</span></div></div></div>`).join('')||'<p style="color:var(--gray4);font-size:13px;">尚無資料</p>';
}

// ====== RECORDS ======
function filterRecords() {
  const q = (document.getElementById('search-input').value||'').toLowerCase();
  const ym = document.getElementById('filter-month').value;
  const sale = document.getElementById('filter-sale').value;
  const filtered = allData.filter(r => {
    if (ym && getYM(r)!==ym) return false;
    if (sale && getVal(r,'Sale')!==sale) return false;
    if (q) {
      const haystack = [getVal(r,'姓名'),getVal(r,'車款'),getVal(r,'Sale'),getVal(r,'單號'),getVal(r,'手機號碼')].join(' ').toLowerCase();
      if (!haystack.includes(q)) return false;
    }
    return true;
  });
  const pmMap = {'現金':'badge-green','匯款/轉帳':'badge-blue','刷卡':'badge-amber','無卡分期':'badge-purple'};
  document.getElementById('tbody-records').innerHTML = filtered.sort((a,b)=>getVal(b,'時間戳記').localeCompare(getVal(a,'時間戳記'))).map(r => `<tr>
    <td>${getVal(r,'成交日期')}</td>
    <td style="font-size:11px;color:var(--gray4);">${fmtOrderId(getVal(r,'單號'))}</td>
    <td>${getVal(r,'姓名')}</td>
    <td>${getVal(r,'手機號碼')}</td>
    <td>${getVal(r,'車款')}</td>
    <td>${getVal(r,'電池規格(V)')} ${getVal(r,'電池規格(ah)')}</td>
    <td style="font-weight:600;">${fmtMoney(getNum(r,'總金額'))}</td>
    <td>${fmtMoney(getNum(r,'訂金'))}</td>
    <td><span class="badge ${pmMap[getVal(r,'訂金支付方式')]||'badge-green'}">${getVal(r,'訂金支付方式')||'—'}</span></td>
    <td>${fmtMoney(getNum(r,'尾款'))}</td>
    <td><span class="badge ${pmMap[getVal(r,'尾款支付方式')]||'badge-green'}">${getVal(r,'尾款支付方式')||'—'}</span></td>
    <td>${getVal(r,'Sale')||'—'}</td>
  </tr>`).join('') || '<tr><td colspan="12" style="text-align:center;color:var(--gray4);padding:2rem;">沒有符合的記錄</td></tr>';
}

// ====== TAB SWITCH ======
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.nav-tab').forEach((t,i) => {
    const tabs = ['overview','sales','purchase','delivery','customer','records'];
    t.classList.toggle('active', tabs[i]===tab);
  });
  ['overview','sales','purchase','delivery','customer','records'].forEach(t => {
    document.getElementById('tab-'+t).style.display = t===tab?'':'none';
  });
}

// ====== INIT ======
// loadData() 由密碼驗證通過後呼叫
// 若已在 session 中驗證過，直接載入
if (sessionStorage.getItem('98go_auth') === '1') loadData();
</script>
